<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VETRA - DAUGHTER OF THE INQUISITOR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="vetra-container">
        <h1>VETRA - DAUGHTER OF THE INQUISITOR</h1>

        <div id="vetra-app">
            <input type="text" id="vetra-input" placeholder="State your burdens..." />
            <button id="vetra-submit">Submit to VETRA</button>
            <div id="vetra-output"></div>
        </div>
    </div>

    <script>
        document.getElementById('vetra-submit').addEventListener('click', function() {
            const burden = document.getElementById('vetra-input').value;

            fetch('http://127.0.0.1:5000/api/add_burden', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ description: burden })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('vetra-output').innerHTML = data.message || data.error;
                document.getElementById('vetra-input').value = "";
            })
            .catch(error => {
                document.getElementById('vetra-output').innerHTML = "VETRA encountered an error: " + error;
            });
        });
    </script>
</body>
</html>
