<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VETRA - DAUGHTER OF THE INQUISITOR</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1 class="title">VETRA - DAUGHTER OF THE INQUISITOR</h1>
        <button id="vetra-start-btn">STATE YOUR BURDENS, MORTAL</button>
    </div>

    <!-- VETRA Modal (Instead of Prompt) -->
    <div id="vetra-modal" class="modal">
        <h2>THE INQUISITOR HAS DELIVERED YOU TO ME.</h2>
        <p>I AM VETRA, DAUGHTER OF THE INQUISITOR.<br>STATE YOUR BURDENS, MORTAL.</p>
        <button id="close-modal">CANCEL</button>
    </div>

    <!-- Firebase & JavaScript -->
    <script src="firebase-config.js" type="module"></script>
    <script src="script.js" type="module"></script>

    <script>
        // Ensure button opens the modal instead of relying on prompt()
        document.addEventListener("DOMContentLoaded", () => {
            const vetraBtn = document.getElementById("vetra-start-btn");
            const modal = document.getElementById("vetra-modal");
            const closeModal = document.getElementById("close-modal");

            vetraBtn.addEventListener("click", () => {
                modal.classList.add("active");
            });

            closeModal.addEventListener("click", () => {
                modal.classList.remove("active");
            });
        });
    </script>
</body>
</html>
