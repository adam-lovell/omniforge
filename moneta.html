<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONETA - ORACLE OF KNOWLEDGE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="index.html">
        <img src="images/omniforge_logo.jpg" alt="OmniForge Logo" id="omniforge-logo">
    </a>
    <div class="container">
        <h1 class="title">STRUCTURE YOUR LEARNING</h1>
        <button id="moneta-start-btn">ENTER DOMAIN</button>
    </div>
    
    <div id="moneta-modal" class="modal">
        <div class="modal-content">
            <p id="error-message" style="color: red;"></p> 
            <button id="close-modal">CANCEL</button>
            <p>I AM MONETA, ORACLE OF KNOWLEDGE.<br>STATE YOUR LEARNING OBJECTIVES</p>
            <p id="moneta-text"></p>

            <div id="learning-list"></div>
            
            <p>
                ENTER YOUR LEARNING OBJECTIVES: <br>
            </p>

            <input type="text" id="learning-topic" placeholder="Learning Topic">
            <select id="learning-category">
                <option value="Technical">Technical</option>
                <option value="Theoretical">Theoretical</option>
                <option value="Creative">Creative</option>
                <option value="Language">Language</option>
                <option value="Physical">Physical</option>
            </select>
            <input type="date" id="learning-deadline">
            <button id="add-learning-btn">Declare Learning Objective</button>

            <h3>YOUR PATH TO MASTERY:</h3>
            <div id="objective-log"></div>

            <button onclick="viewObjectives()">View Objectives</button>
            <button onclick="markObjectiveComplete()">Mark as Completed</button>
            <button onclick="saveAndExit()">Save and Exit</button>
        </div>
    </div>

    <script> // EMBEDDED JAVASCRIPT BEGINS

    let learningObjectives = [];

    document.addEventListener("DOMContentLoaded", () => {
        console.log("✅ MONETA is Ready!");

        const startBtn = document.getElementById("moneta-start-btn");
        const modal = document.getElementById("moneta-modal");
        const closeModal = document.getElementById("close-modal");
        const objectiveList = document.getElementById("objective-log");
        const errorMessage = document.getElementById("error-message");

        startBtn.addEventListener("click", () => {
            console.log("📚 MONETA SUMMONED!");
            modal.classList.add("active");
        });

        closeModal.addEventListener("click", () => {
            modal.classList.remove("active");
        });

        document.getElementById("add-learning-btn").addEventListener("click", () => {
            const topic = document.getElementById("learning-topic").value.trim();
            const category = document.getElementById("learning-category").value;
            const deadline = document.getElementById("learning-deadline").value;

            if (!topic || !category || !deadline) {
                errorMessage.textContent = "⚠️ INSUFFICIENT DATA. REFINE YOUR INTENT, MORTAL.";
                return;
            }

            learningObjectives.push({ topic, category, deadline });

            const objectiveEntry = document.createElement("p");
            objectiveEntry.textContent = `📖 ${topic} [${category}] - Completion by ${deadline}`;
            objectiveList.appendChild(objectiveEntry);

            errorMessage.textContent = "";

            // Clear input fields
            document.getElementById("learning-topic").value = "";
            document.getElementById("learning-deadline").value = "";
        });
    });

    function viewObjectives() {
        if (learningObjectives.length === 0) {
            alert("⚠️ NO LEARNING OBJECTIVES FOUND. HAVE YOU SET A COURSE, MORTAL?");
            return;
        }

        let message = "📜 **YOUR LEARNING OBJECTIVES:**\n";
        learningObjectives.forEach((entry, index) => {
            message += `${index + 1}. 📖 ${entry.topic} [${entry.category}] - Complete by ${entry.deadline}\n`;
        });

        alert(message);
    }

    function markObjectiveComplete() {
        if (learningObjectives.length === 0) {
            alert("⚠️ NO OBJECTIVES TO COMPLETE.");
            return;
        }

        let selection = prompt("ENTER THE NUMBER OF THE OBJECTIVE TO MARK AS COMPLETE:").trim();
        let index = parseInt(selection) - 1;

        if (isNaN(index) || index < 0 || index >= learningObjectives.length) {
            alert("⚠️ INVALID CHOICE. TRY AGAIN.");
            return;
        }

        learningObjectives.splice(index, 1);
        document.getElementById("objective-log").children[index].remove();

        alert("✅ KNOWLEDGE ACQUIRED. OBJECTIVE COMPLETED.");
    }

    function saveAndExit() {
        alert("✅ MONETA HAS RECORDED YOUR PATH TO MASTERY.");
    }

    </script> <!-- JAVASCRIPT ENDS -->

</body>
</html>
