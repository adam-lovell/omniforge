<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OmniForge Account</title>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
</head>
<body>
  <h2>OmniForge Account</h2>

  <input type="email" id="email" placeholder="Email" />
  <input type="password" id="password" placeholder="Password" />
  <br><br>

  <button onclick="signUp()">Sign Up</button>
  <button onclick="logIn()">Log In</button>
  <button onclick="logOut()">Log Out</button>

  <p id="message"></p>

  <script>
    // Firebase config (you already have this from your Firebase project)
    const firebaseConfig = {
      apiKey: "AIzaSyCfanKgFO98R1uKPpEAUUFOW1U66knL8Zs",
      authDomain: "hellforge-13d88.firebaseapp.com",
      projectId: "hellforge-13d88",
      storageBucket: "hellforge-13d88.firebasestorage.app",
      messagingSenderId: "453743116508",
      appId: "1:453743116508:web:8beaee82ff6b78a2167419",
      measurementId: "G-WRCFGP7F79"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function signUp() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          document.getElementById("message").innerText = "Signup successful!";
        })
        .catch((error) => {
          document.getElementById("message").innerText = error.message;
        });
    }

    function logIn() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password)
        .then((userCredential) => {
          document.getElementById("message").innerText = "Login successful!";
        })
        .catch((error) => {
          document.getElementById("message").innerText = error.message;
        });
    }

    function logOut() {
      auth.signOut().then(() => {
        document.getElementById("message").innerText = "Logged out.";
      });
    }
  </script>
</body>
</html>
