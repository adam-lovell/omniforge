<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNIFORGE - Sign Up</title>
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <a href="index.html">
        <img src="images/omniforge_logo.jpg" alt="OmniForge Logo" id="omniforge-logo">
    </a>
    
    <div class="container">
        <h1 class="title">OMNIFORGE</h1>

         <!-- ✅ Professional Navbar -->
        <header class="navbar">
          <div class="left-nav">
            <a href="index.html" class="logo-link">
              <img src="images/omniforge_logo.jpg" alt="OmniForge Logo" id="omniforge-logo">
            </a>
            <nav class="nav-links">
              <a href="/lts/tutoring.html">Tutoring</a>
              <a href="/cybersecurity.html">Cybersecurity</a>
              <a href="login.html">Login</a>
              <a href="about_omniforge.html">About</a>
            </nav>
          </div>
        </header>
        
        <!-- 🔹 Sign-Up Section -->
        <div class="auth-section">
            <h2 class="question">Forge Your Path:</h2>
            <form id="signup-form">
                <input type="text" id="signup-name" placeholder="Full Name" required>
                <input type="email" id="signup-email" placeholder="Email" required>
                <input type="tel" id="signup-phone" placeholder="Phone Number" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <input type="password" id="signup-confirm-password" placeholder="Confirm Password" required>
                <button type="submit" class="auth-button">Sign Up</button>
            </form>
            <p id="signup-error-message" class="hidden"></p> 
        </div>

    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
